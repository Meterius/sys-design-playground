services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: postgres_postgis
    restart: unless-stopped

    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app_db

    ports:
      - "5432:5432"

    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data

      # Run initialization SQL on first startup
      - ./postgres/init:/docker-entrypoint-initdb.d/

  tiling-backend:
    build:
      context: ../../
      dockerfile: infra/geo/tiling_backend/Dockerfile

    container_name: tiling-backend

    ports:
      - "8080:8080"

    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8080
      ASSET_ROOT: /app/assets

#    volumes:
#      - H:/tiling-backend-volume:/app/assets

    restart: unless-stopped

volumes:
  postgres_data: