services:
  traefik:
    image: traefik:v3.6

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"

    ports:
      - "80:80"
      - "8081:8080"

  postgres_osm:
    build:
      context: ./postgres_osm
      dockerfile: Dockerfile

    restart: unless-stopped

    command: -c config_file=/etc/postgresql.conf

    volumes:
      - postgres_osm_data:/var/lib/postgresql/data
      - ./postgres_osm/postgres.conf:/etc/postgresql.conf
      - ./postgres_osm/init:/docker-entrypoint-initdb.d/

    environment:
      POSTGRES_USER: ${POSTGRES_OSM_USER}
      POSTGRES_PASSWORD: ${POSTGRES_OSM_PASSWORD}
      POSTGRES_DB: ${POSTGRES_OSM_DB}

    ports:
      - "5433:5432"

  omt_tileserver_gl:
    image: "maptiler/tileserver-gl:latest"

    command:
      - --port
      - "8080"
      - --config
      - "/style/config.json"

    volumes:
      - ${OPENMAPTILES_DIR}/data:/data
      - ${OPENMAPTILES_DIR}/style:/style
      - ${OPENMAPTILES_DIR}/build:/build

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.omt_tileserver_gl.rule=Host(`tiles.jlh_maps.localhost`)"
      - "traefik.http.routers.omt_tileserver_gl.entrypoints=web"
      - "traefik.http.services.omt_tileserver_gl.loadbalancer.server.port=8080"

  raster_tile_json_server:
    image: nginx:alpine

    restart: unless-stopped

    volumes:
      - ${SAT_RASTER_TILE_JSON_DIR}:/usr/share/nginx/html/raster/sen2:ro
      - ./raster_tile_json_server/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.raster_tile_json_server.rule=Host(`raster.jlh_maps.localhost`)"
      - "traefik.http.routers.raster_tile_json_server.entrypoints=web"
      - "traefik.http.services.raster_tile_json_server.loadbalancer.server.port=80"

  core_service:
    build:
      context: ../../
      dockerfile: infra/geo/core_service/Dockerfile
    restart: unless-stopped

    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8080
      POSTGRES_OSM_URL: postgres://${POSTGRES_OSM_USER}:${POSTGRES_OSM_PASSWORD}@postgres_osm:5432/${POSTGRES_OSM_DB}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core_service.rule=Host(`api.jlh_maps.localhost`)"
      - "traefik.http.routers.core_service.entrypoints=web"
      - "traefik.http.services.core_service.loadbalancer.server.port=8080"

  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest

    volumes:
      - ./valhalla/custom_files:/custom_files

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.valhalla.rule=Host(`valhalla.jlh_maps.localhost`)"
      - "traefik.http.routers.valhalla.entrypoints=web"
      - "traefik.http.services.valhalla.loadbalancer.server.port=8002"

volumes:
  postgres_osm_data:
