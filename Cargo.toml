[package]
name = "jlh-sys-design-playground"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "app"
path = "src/bin/app.rs"

[features]
default = []
debug = ["bevy/debug"]

[dependencies]
bevy = { version = "0.18.1", features = ["dynamic_linking"] }
bevy_pancam = "0.20.0"
bevy_prototype_lyon = "0.16.0"

[profile.dev]
opt-level = 0
incremental = true

[profile.dev.package."*"]
opt-level = 3
