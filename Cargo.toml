[package]
name = "jlh_sys_design_playground"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "3"
members = ["crates/generated_queries", "crates/utilities"]

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "app"
path = "src/bin/app.rs"

[[bin]]
name = "process_osm_shapefile_into_infra"
path = "src/bin/process_osm_shapefile_into_infra.rs"

[[bin]]
name = "fetch_osm_shapefiles"
path = "src/bin/fetch_osm_shapefiles.rs"

[features]
default = []
debug = ["bevy/debug", "bevy/bevy_debug_stepping"]

[dependencies]
generated_queries = { path = "./crates/generated_queries" }
utilities = { path = "./crates/utilities", features = ["bevy-reflect"] }
bevy = { version = "0.18.1", features = ["jpeg"] }
bevy_pancam = { version = "0.20.0", features = ["bevy_egui_0_39"] }
bevy_prototype_lyon = "0.16.0"
geojson = "1.0.0"
osmpbf = "0.3.8"
tokio = { version = "1.50.0", features = ["sync", "rt", "rt-multi-thread", "macros", "fs", "time", "signal"] }
walkdir = "2.5.0"
serde = { version = "1.0.228", features = ["derive"] }
bevy_vector_shapes = "0.12.0"
itertools = "0.14.0"
reqwest = { version = "0.13.2", features = ["json", "form"] }
image = "0.25.10"
futures = "0.3.32"
bevy-tokio-tasks = "0.18.0"
async-channel = "2.5.0"
smallvec = "1.15.1"
thiserror = "2.0.18"
hex = "0.4.3"
async = "0.0.0"
fs = "0.0.5"
lru-cache = "0.1.2"
serde_json = "1.0.149"
tokio-rate-limit = "0.8.1"
ratelimit = "1.0.0"
tokio-postgres = "0.7.17"
priority-queue = "2.7.0"
bevy-inspector-egui = "0.36.0"
egui = "0.33.3"
glam = "0.30.10"
dotenvy = "0.15.7"
crossterm = "0.28"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-flame = "0.2"
cached = "0.59.0"
big_space = "0.12.0"
shapefile = "0.8.0"
strum = { version = "0.28.0", features = ["derive"] }
postgis = "0.9.0"
zip = "6.0.0"

[profile.release]
debug = "line-tables-only"

[profile.dev]
opt-level = 0
incremental = true

[profile.dev.package."*"]
opt-level = 3
