[package]
name = "jlh-sys-design-playground"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "app"
path = "src/bin/app.rs"

[features]
default = []
debug = ["bevy/debug"]

[dependencies]
bevy = { version = "0.18.1", features = ["dynamic_linking", "jpeg"] }
bevy_pancam = "0.20.0"
bevy_prototype_lyon = "0.16.0"
geojson = "1.0.0"
osmpbf = "0.3.8"
tokio = { version = "1.50.0", features = ["sync", "rt", "rt-multi-thread", "macros", "fs"] }
walkdir = "2.5.0"
serde = { version = "1.0.228", features = ["derive"] }
bevy_vector_shapes = "0.12.0"
itertools = "0.14.0"
reqwest = "0.13.2"
image = "0.25.10"
futures = "0.3.32"
bevy-tokio-tasks = "0.18.0"
async-channel = "2.5.0"
smallvec = "1.15.1"
thiserror = "2.0.18"
hex = "0.4.3"
async = "0.0.0"
fs = "0.0.5"
lru-cache = "0.1.2"

[profile.dev]
opt-level = 0
incremental = true

[profile.dev.package."*"]
opt-level = 3
